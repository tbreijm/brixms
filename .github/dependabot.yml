version: 2
updates:
  # Rust dependencies. Minor/patch bumps are grouped into one PR to keep noise
  # down; majors come as individual PRs. Every PR runs the full CI green-gate.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI / release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
