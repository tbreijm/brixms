name: CI

# The green-gate that protects `main` (Build_Plan_v2.md §2 + Ring0_Build_Plan
# §1.10). Holds the determinism discipline: fmt, clippy-as-error, the full test
# suite, frozen-artifact stability, and a supply-chain/license gate must all
# pass. Frozen-artifact drift (canon vectors, oracle/ir insta snapshots) shows
# up as a failing `determinism` or `test` job.
on:
  push:
    branches: [main]
  pull_request:
  merge_group: # merge-queue ready

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace

  determinism:
    name: determinism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Run the suite twice; frozen artifacts must not drift
        run: |
          set -euo pipefail
          cargo test --workspace
          cargo test --workspace
          # insta writes *.snap.new only on a snapshot mismatch, and the canon
          # golden-vector test fails outright on drift. Either way the working
          # tree must be byte-identical after repeated runs (proxy for the G3
          # reproducibility gate).
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Non-deterministic output / frozen-artifact drift after repeated runs:"
            git status --porcelain
            git --no-pager diff | head -300
            exit 1
          fi
          echo "Frozen artifacts stable across repeated runs."

  conformance:
    name: conformance
    # Already covered by `cargo test --workspace` in the `test` job above;
    # broken out as its own named check (issue #11 / Ring0 §1.10's "starts
    # Day 1, never stops") so oracle == compiled-engine drift has a distinct,
    # always-visible signal as this suite grows (differential fuzz, more
    # fixtures) instead of being buried in the general test job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Errata fixtures + oracle/compiled-engine differential
        run: cargo test -p brix-conformance

  acceptance:
    name: acceptance
    # Already covered by `cargo test --workspace` in the `test` job above;
    # broken out as its own named check (issue #45's "CI fails when spec
    # coverage, support status, or expected diagnostics drift without an
    # explicit fixture update") so the spec-derived acceptance corpus (52
    # spec fixtures + 6 negative fixtures + the committed coverage report)
    # has a distinct, always-visible signal, same rationale as `conformance`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Spec-derived acceptance corpus (parse/lower/check/phase + negative fixtures + coverage report)
        run: cargo test -p brix-conformance --test acceptance_corpus

  reproducibility:
    name: reproducibility
    # Issue #41 (G3): the in-repo proxy for the two-machine reproducibility gate.
    # Deterministic emit (byte-identical generated workspace), cache-integrity
    # fail-closed (a corrupted/incomplete cache entry is rebuilt, never trusted),
    # and deterministic artifact-size budgets. The heavier two-clean-builds
    # byte-identity check is `#[ignore]`d (two full `cargo build`s); the
    # two-machine comparison itself is a release-infra concern (#46), not this
    # job. Broken out as its own signal, same rationale as `conformance`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Reproducible emit + cache-integrity + deterministic budgets
        run: cargo test -p brix-cli --test reproducibility

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Supply-chain + license gate (advisories, licenses, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # Reported as a code-quality measurement, not a hard gate (no threshold);
    # not a required status check.
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Measure coverage
        run: |
          cargo llvm-cov --workspace --summary-only | tee coverage.txt
          {
            echo "### Coverage (workspace)"
            echo ''
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
